<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Smart Thorana Pro Controller 🏮</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: var(--bg); color: white; margin: 0; padding: 10px; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.6s ease; }
        .login-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 85%; max-width: 350px; text-align: center; }
        .login-card h2 { color: var(--gold); margin-bottom: 25px; font-size: 22px; }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; font-size: 18px; text-align: center; box-sizing: border-box; outline: none; }
        .login-card input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .login-btn { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        
        #main-content { display: none; opacity: 0; transition: opacity 0.8s ease; width: 100%; }

        h2 { color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); margin-bottom: 15px; }
        .container { position: relative; display: inline-block; padding: 0; border: 2px solid #333; border-radius: 15px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 700px; line-height: 0; }
        .thorana-img { width: 100%; height: auto; display: block; border-radius: 12px; -webkit-user-drag: none; pointer-events: none; }
        
        .btn { position: absolute; transform: translate(-50%, -50%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; user-select: none; touch-action: none; border: 2px solid rgba(255,255,255,0.3); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 3vw; }
        @media (min-width: 700px) { .btn { font-size: 18px; } }
        .circle { border-radius: 50%; } 
        .square { border-radius: 10%; }

        .on { background: #2ecc71 !important; box-shadow: 0 0 20px #2ecc71; border-color: #fff !important; transform: translate(-50%, -50%) scale(1.1); z-index: 5; } 
        .off { background: rgba(0,0,0,0.7); border-color: rgba(255,255,255,0.4); }

        /* Responsive Percentage Positions */
        .p1 { top: 32.5%; left: 51.5%; width: 11%; height: 11%; }
        .p2 { top: 86.5%; left: 11.4%; width: 6.8%; height: 9.3%; }
        .p8 { top: 86.5%; left: 91.9%; width: 6.8%; height: 9.3%; }
        .p3l { top: 62.5%; left: 29%; width: 10%; height: 10%; }
        .p3m { top: 67.5%; left: 43.8%; width: 10%; height: 10%; }
        .p3r { top: 67.5%; left: 59.2%; width: 10%; height: 10%; }
        .p3x { top: 62.5%; left: 74%; width: 10%; height: 10%; }
        .p4l { top: 53.5%; left: 12.5%; width: 7.2%; height: 10%; }
        .p4r { top: 53.5%; left: 91.5%; width: 7.2%; height: 10%; }
        .p5l { top: 28.5%; left: 33.2%; width: 9.8%; height: 9.8%; }
        .p5r { top: 28.5%; left: 69.8%; width: 9.8%; height: 9.8%; }
        .p6l { top: 41.5%; left: 32.2%; width: 6.8%; height: 9.3%; }
        .p6r { top: 41.5%; left: 71.5%; width: 6.8%; height: 9.3%; }
        .p7l { top: 18.5%; left: 41.5%; width: 8.5%; height: 8.5%; }
        .p7r { top: 18.5%; left: 61.5%; width: 8.5%; height: 8.5%; }

        .footer-container { margin-top: 30px; padding: 20px; border-top: 1px solid #222; width: 100%; }
        .tsda-text { font-size: 20px; font-weight: bold; color: var(--gold); margin: 5px 0; letter-spacing: 1px; }
        .gm-text { font-size: 12px; color: #666; margin: 2px 0; }
    </style>
</head>
<body>
    <!-- ... (Login Screen සහ HTML Content කලින් වගේමයි) ... -->
    <div id="login-screen">
        <div class="login-card">
            <h2>Smart Thorana Pro 🏮</h2>
            <input type="tel" id="phoneInput" placeholder="07XXXXXXXX" maxlength="10">
            <button class="login-btn" onclick="checkLogin()">LOGIN</button>
            <p id="error-msg" style="color: #ff4757; font-size: 13px; margin-top: 10px; display: none;">අංකය වැරදියි.</p>
        </div>
    </div>

    <div id="main-content">
        <div class='container' id='mainContainer'>
            <img src='https://raw.githubusercontent.com/GaMalinda/Thorana-Control-8-Relay/main/WhatsApp%20Image%202026-05-03%20at%2010.15.32.jpeg' class='thorana-img'>
            <!-- Buttons -->
            <div class='btn circle off p1' data-id='0' data-cls='p1' onclick='handleBtnClick(this)'>1</div>
            <div class='btn square off p2' data-id='1' data-cls='p2' onclick='handleBtnClick(this)'>2</div>
            <div class='btn square off p8' data-id='7' data-cls='p8' onclick='handleBtnClick(this)'>8</div>
            <div class='btn circle off p3l' data-id='2' data-cls='p3l' onclick='handleBtnClick(this)'>3</div>
            <div class='btn circle off p3m' data-id='2' data-cls='p3m' onclick='handleBtnClick(this)'>3</div>
            <div class='btn circle off p3r' data-id='2' data-cls='p3r' onclick='handleBtnClick(this)'>3</div>
            <div class='btn circle off p3x' data-id='2' data-cls='p3x' onclick='handleBtnClick(this)'>3</div>
            <div class='btn square off p4l' data-id='3' data-cls='p4l' onclick='handleBtnClick(this)'>4</div>
            <div class='btn square off p4r' data-id='3' data-cls='p4r' onclick='handleBtnClick(this)'>4</div>
            <div class='btn circle off p5l' data-id='4' data-cls='p5l' onclick='handleBtnClick(this)'>5</div>
            <div class='btn circle off p5r' data-id='4' data-cls='p5r' onclick='handleBtnClick(this)'>5</div>
            <div class='btn square off p6l' data-id='5' data-cls='p6l' onclick='handleBtnClick(this)'>6</div>
            <div class='btn square off p6r' data-id='5' data-cls='p6r' onclick='handleBtnClick(this)'>6</div>
            <div class='btn circle off p7l' data-id='6' data-cls='p7l' onclick='handleBtnClick(this)'>7</div>
            <div class='btn circle off p7r' data-id='6' data-cls='p7r' onclick='handleBtnClick(this)'>7</div>
        </div>
        <!-- Footer විස්තර කලින් වගේමයි -->
        <div class='footer-container'>
            <div class='tsda-text'>TSDA ENGINEERING</div>
            <div class='tsda-text' style="font-size: 16px;">071 200 1813</div>
        </div>
    </div>

<script>
    // Scripts කලින් වගේමයි, කිසිදු වෙනසක් නැත.
    const AUTH_NUMBER = "0712001813";
    const firebaseConfig = { apiKey: "AIzaSyA9iNAeq3aAtwHHqho84sodoeF6uipd6n4", databaseURL: "https://thorana-8-relay-default-rtdb.firebaseio.com" };
    function checkLogin() { const input = document.getElementById('phoneInput').value; if(input === AUTH_NUMBER) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; document.getElementById('main-content').style.opacity = '1'; listenToFirebase(); } }
    function listenToFirebase() { const source = new EventSource(`${firebaseConfig.databaseURL}/relays.json?auth=${firebaseConfig.apiKey}`); source.onmessage = e => { const res = JSON.parse(e.data); if (res.path === "/") { if (res.data) Object.keys(res.data).forEach(k => updateUI(k, res.data[k])); } else if (res.path) updateUI(res.path.replace("/", ""), res.data); }; }
    function updateUI(key, status) { let id = parseInt(key.replace("r", "")) - 1; document.querySelectorAll(`[data-id='${id}']`).forEach(b => { if(status) { b.classList.add('on'); b.classList.remove('off'); } else { b.classList.remove('on'); b.classList.add('off'); } }); }
    function handleBtnClick(el) { let id = el.getAttribute('data-id'); let newStatus = !el.classList.contains('on'); fetch(`${firebaseConfig.databaseURL}/relays/r${parseInt(id)+1}.json?auth=${firebaseConfig.apiKey}`, { method: 'PUT', body: JSON.stringify(newStatus) }); }
</script>
</body>
</html>
