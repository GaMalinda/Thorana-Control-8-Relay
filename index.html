<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>🏮නිග්‍රෝධමික ජාතකය🏮</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: var(--bg); color: white; margin: 0; padding: 10px; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.6s ease; }
        .login-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 85%; max-width: 350px; text-align: center; }
        .login-card h2 { color: var(--gold); margin-bottom: 25px; font-size: 22px; }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; font-size: 18px; text-align: center; box-sizing: border-box; outline: none; }
        .login-card input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .login-btn { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        
        #main-content { display: none; opacity: 0; transition: opacity 0.8s ease; width: 100%; }

        h2 { color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); margin-bottom: 15px; }
        .container { position: relative; display: inline-block; padding: 0; border: 2px solid #333; border-radius: 15px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 700px; line-height: 0; }
        .thorana-img { width: 100%; height: auto; display: block; border-radius: 12px; -webkit-user-drag: none; pointer-events: none; }
        
        /* Font size change based on screen width */
        .btn { position: absolute; transform: translate(-50%, -50%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; user-select: none; touch-action: none; border: 2px solid rgba(255,255,255,0.3); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 3vw; }
        @media (min-width: 700px) { .btn { font-size: 18px; } }
        .circle { border-radius: 50%; } 
        .square { border-radius: 10%; }

        .on { background: #2ecc71 !important; box-shadow: 0 0 20px #2ecc71, 0 0 40px rgba(46, 204, 113, 0.6); border-color: #fff !important; transform: translate(-50%, -50%) scale(1.1); z-index: 5; } 
        .off { background: rgba(0,0,0,0.7); border-color: rgba(255,255,255,0.4); }
        .btn:active { transform: translate(-50%, -50%) scale(0.85); opacity: 0.9; }

        .selected { border: 3px solid #ffee00 !important; box-shadow: 0 0 25px #ffee00 !important; z-index: 100; }
        #editor-controls { margin-bottom: 15px; display: none; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); }
        .ctrl-btn { background: var(--gold); color: black; border: none; padding: 12px 18px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #log-box { margin-top: 20px; background: #111; padding: 15px; border-radius: 8px; display: none; text-align: left; border: 1px solid #444; }
        pre { background: #000; padding: 15px; color: #0f0; font-size: 11px; overflow-x: auto; }

        .footer-container {
    display: flex;
    flex-direction: column; /* එක යට එක දත්ත පෙන්වීමට */
    align-items: center;    /* හරස් අතට මැදට ගැනීමට (Horizontal center) */
    justify-content: center; /* සිරස් අතට මැදට ගැනීමට (Vertical center) */
    text-align: center;      /* අකුරු මැදට ගැනීමට */
    width: 100%;
    margin-top: 20px;       /* ඉහළින් පොඩි ඉඩක් තැබීමට */
    padding-bottom: 10px;
}

.tsda-text, .gm-text {
    width: 100%;            /* සම්පූර්ණ පළල අරගෙන මැදට වීමට */
    margin: 2px 0;          /* පේළි අතර පොඩි ඉඩක් තැබීමට */
}

        /* ALL Sizes and Positions converted to % for perfect responsiveness */
        .p1 { top: 31.3%; left: 50.4%; width: 11%; height: 11%; }
        .p2 { top: 85.5%; left: 10.6%; width: 6.8%; height: 9.3%; }
        .p8 { top: 85.7%; left: 90.6%; width: 6.8%; height: 9.3%; }
        .p3l { top: 62.1%; left: 27.8%; width: 10%; height: 10%; }
        .p3m { top: 67.1%; left: 42.3%; width: 10%; height: 10%; }
        .p3r { top: 66.9%; left: 57.9%; width: 10%; height: 10%; }
        .p3x { top: 62.1%; left: 72.4%; width: 10%; height: 10%; }
        .p4l { top: 56.3%; left: 8%; width: 7.2%; height: 10%; }
        .p4r { top: 56%; left: 92.4%; width: 7.2%; height: 10%; }
        .p5l { top: 27.4%; left: 27.6%; width: 9.8%; height: 9.8%; }
        .p5r { top: 27.4%; left: 72.8%; width: 9.8%; height: 9.8%; }
        .p6l { top: 47.3%; left: 28.5%; width: 6.8%; height: 9.3%; }
        .p6r { top: 47.3%; left: 71.7%; width: 6.8%; height: 9.3%; }
        .p7l { top: 16.5%; left: 40.7%; width: 8.5%; height: 8.5%; }
        .p7r { top: 17.2%; left: 60%; width: 8.5%; height: 8.5%; }

    </style>
</head>
<body>
    <!-- HTML & Scripts ඒ විදිහටම තියෙනවා... -->
    <div id="login-screen">
        <div class="login-card">
            <h2>🏮නිග්‍රෝධමික ජාතකය🏮</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">පාලක පුවරුවට පිවිසීමට ඔබගේ අංකය ඇතුළත් කරන්න</p>
            <input type="tel" id="phoneInput" placeholder="0XXXXXXXXX" maxlength="10">
            <button class="login-btn" onclick="checkLogin()">LOGIN</button>
            <p id="error-msg" style="color: #ff4757; font-size: 13px; margin-top: 10px; display: none;">අංකය වැරදියි. නැවත උත්සාහ කරන්න.</p>
        </div>
    </div>

    <div id="main-content">
        <h2>🏮නිග්‍රෝධමික ජාතකය🏮</h2>
        <div id='editor-controls'>
            Selected: <span id='selName' style='color:var(--gold)'>None</span><br>
            <button class='ctrl-btn' onclick='changeSize(2)'>SIZE +</button>
            <button class='ctrl-btn' onclick='changeSize(-2)'>SIZE -</button>
        </div>

        <div class='container' id='mainContainer'>
            <img src='https://raw.githubusercontent.com/GaMalinda/Thorana-Control-8-Relay/main/WhatsApp%20Image%202026-05-03%20at%2010.15.32.jpeg' class='thorana-img' alt="Thorana Background">
            <div class='btn circle off p1' data-id='0' data-cls='p1' onclick='handleBtnClick(this)'>1</div>
            <div class='btn square off p2' data-id='1' data-cls='p2' onclick='handleBtnClick(this)'>2</div>
            <div class='btn square off p8' data-id='7' data-cls='p8' onclick='handleBtnClick(this)'>8</div>
            <div class='btn circle off p3l' data-id='2' data-cls='p3l' onclick='handleBtnClick(this)'>3</div>
            <div class='btn circle off p3m' data-id='2' data-cls='p3m' onclick='handleBtnClick(this)'>3</div>
            <div class='btn circle off p3r' data-id='2' data-cls='p3r' onclick='handleBtnClick(this)'>3</div>
            <div class='btn circle off p3x' data-id='2' data-cls='p3x' onclick='handleBtnClick(this)'>3</div>
            <div class='btn square off p4l' data-id='3' data-cls='p4l' onclick='handleBtnClick(this)'>4</div>
            <div class='btn square off p4r' data-id='3' data-cls='p4r' onclick='handleBtnClick(this)'>4</div>
            <div class='btn circle off p5l' data-id='4' data-cls='p5l' onclick='handleBtnClick(this)'>5</div>
            <div class='btn circle off p5r' data-id='4' data-cls='p5r' onclick='handleBtnClick(this)'>5</div>
            <div class='btn square off p6l' data-id='5' data-cls='p6l' onclick='handleBtnClick(this)'>6</div>
            <div class='btn square off p6r' data-id='5' data-cls='p6r' onclick='handleBtnClick(this)'>6</div>
            <div class='btn circle off p7l' data-id='6' data-cls='p7l' onclick='handleBtnClick(this)'>7</div>
            <div class='btn circle off p7r' data-id='6' data-cls='p7r' onclick='handleBtnClick(this)'>7</div>
        </div>

        <div class='footer-container'>
            <p><button onclick='unlockEditor()' id='lockBtn' style='background:transparent; color:#333; border:none; font-size:10px;'>.</button></p>
            <div class='tsda-text'>TSDA ENGINEERING</div>
            <div class='tsda-text' style="font-size: 16px;">071 200 1813</div>
            <div class='gm-text' style="font-size: 6px;">DEVELOPED BY TSDA ENGINEERING</div>
            <div id="myNumber" style="font-size: 10px; color: #ffffff; margin-top: 5px; display: none;">077 180 7892</div>
        </div>
        <div id='log-box'><button class='ctrl-btn' style='width:100%' onclick='copyToClipboard()'>Copy Code</button><pre id='coords'></pre></div>
    </div>

<script>
    const AUTH_NUMBER = "0712001813";
    let editMode = false; let activeBtn = null; let selectedEl = null;
    const firebaseConfig = { apiKey: "AIzaSyA9iNAeq3aAtwHHqho84sodoeF6uipd6n4", databaseURL: "https://thorana-8-relay-default-rtdb.firebaseio.com" };

    function checkLogin() {
        const input = document.getElementById('phoneInput').value;
        const error = document.getElementById('error-msg');
        if(input === AUTH_NUMBER) {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.display = 'block';
                setTimeout(() => main.style.opacity = '1', 50);
                listenToFirebase();
            }, 600);
        } else {
            error.style.display = 'block';
            document.getElementById('phoneInput').style.borderColor = '#ff4757';
        }
    }

    function listenToFirebase() {
        const url = `${firebaseConfig.databaseURL}/relays.json?auth=${firebaseConfig.apiKey}`;
        const source = new EventSource(url);
        source.onmessage = e => {
            const res = JSON.parse(e.data);
            if (res.path === "/") { if (res.data) Object.keys(res.data).forEach(k => updateUI(k, res.data[k])); }
            else if (res.path) updateUI(res.path.replace("/", ""), res.data);
        };
    }

    function updateUI(key, status) {
        let id = parseInt(key.replace("r", "")) - 1;
        document.querySelectorAll(`[data-id='${id}']`).forEach(b => {
            if(status) { b.classList.add('on'); b.classList.remove('off'); }
            else { b.classList.remove('on'); b.classList.add('off'); }
        });
    }

    function handleBtnClick(el) {
        if(!editMode) {
            let id = el.getAttribute('data-id');
            let isCurrentlyOn = el.classList.contains('on');
            let newStatus = !isCurrentlyOn;
            document.querySelectorAll(`[data-id='${id}']`).forEach(b => {
                if(newStatus) { b.classList.add('on'); b.classList.remove('off'); }
                else { b.classList.remove('on'); b.classList.add('off'); }
            });
            fetch(`${firebaseConfig.databaseURL}/relays/r${parseInt(id)+1}.json?auth=${firebaseConfig.apiKey}`, {
                method: 'PUT', body: JSON.stringify(newStatus)
            });
            return;
        }
        if(selectedEl) selectedEl.classList.remove('selected');
        selectedEl = el; selectedEl.classList.add('selected');
        document.getElementById('selName').innerText = 'Button ' + el.innerText;
    }

    function unlockEditor() { 
    if(prompt('Admin Key:') == '4321') { 
        editMode = true; 
        
        // මේ පේළිය අලුතින් එකතු කරන්න - එවිට Admin Key එක දුන් පසු අංකය පෙනේවි
        document.getElementById('myNumber').style.display = 'block'; 

        document.getElementById('log-box').style.display='block'; 
        document.getElementById('editor-controls').style.display='block'; 
        document.getElementById('lockBtn').style.display='none'; 
        updateLogs(); 
    } 
}
    // Updated changeSize for % support
    function changeSize(d) { 
        if(!selectedEl) return; 
        const r = container.getBoundingClientRect();
        let currentW_px = selectedEl.offsetWidth;
        let newW_pct = ((currentW_px + d) / r.width * 100).toFixed(1);
        let newH_pct = ((selectedEl.offsetHeight + (selectedEl.classList.contains('square') ? d*1.37 : d)) / r.height * 100).toFixed(1);
        
        selectedEl.style.width = newW_pct + '%';
        selectedEl.style.height = newH_pct + '%';
        updateLogs(); 
    }
    
    const container = document.getElementById('mainContainer');
    container.onpointerdown = e => { if(editMode && e.target.classList.contains('btn')) activeBtn = e.target; };
    container.onpointermove = e => { 
        if(editMode && activeBtn) { 
            const r = container.getBoundingClientRect(); 
            activeBtn.style.left = ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%'; 
            activeBtn.style.top = ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%'; 
            updateLogs(); 
        } 
    };
    container.onpointerup = e => { activeBtn = null; };

    function updateLogs() {
        let log = ''; document.querySelectorAll('.btn').forEach(b => {
            log += `.${b.getAttribute('data-cls')} { top: ${b.style.top || getComputedStyle(b).top}; left: ${b.style.left || getComputedStyle(b).left}; width: ${b.style.width || getComputedStyle(b).width}; height: ${b.style.height || getComputedStyle(b).height}; }\n`;
        });
        document.getElementById('coords').innerText = log;
    }

    function copyToClipboard() { navigator.clipboard.writeText(document.getElementById('coords').innerText); alert('Coordinates Copied!'); }
</script>
</body>
</html>
